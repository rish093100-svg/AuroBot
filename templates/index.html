<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AuroBot – Sri Aurobindo College</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@300;400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/static/css/style.css" />
  </head>
  <body>
    <!-- ═══════════════════════════  LAUNCHER BUTTON  ══════════════════════════ -->
    <button class="launcher" id="launcher" aria-label="Open AuroBot">
      <span class="launcher-icon">
        <svg viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="20" cy="20" r="20" fill="none" />
          <path
            d="M8 13C8 11.3431 9.34315 10 11 10H29C30.6569 10 32 11.3431 32 13V23C32 24.6569 30.6569 26 29 26H22L16 31V26H11C9.34315 26 8 24.6569 8 23V13Z"
            fill="white"
          />
          <circle cx="14" cy="18" r="2" fill="var(--crimson)" />
          <circle cx="20" cy="18" r="2" fill="var(--crimson)" />
          <circle cx="26" cy="18" r="2" fill="var(--crimson)" />
        </svg>
      </span>
      <span class="launcher-pulse"></span>
    </button>

    <!-- ═══════════════════════════  CHAT WINDOW  ══════════════════════════════ -->
    <div
      class="chat-window"
      id="chatWindow"
      role="dialog"
      aria-modal="true"
      aria-label="AuroBot Chat"
    >
      <!-- Header -->
      <div class="chat-header">
        <div class="header-logo">
          <div class="header-avatar">
            <svg viewBox="0 0 36 36" fill="none">
              <circle cx="18" cy="18" r="18" fill="var(--crimson)" />
              <path
                d="M10 15C10 13.3431 11.3431 12 13 12H23C24.6569 12 26 13.3431 26 15V21C26 22.6569 24.6569 24 23 24H19.5L15 27.5V24H13C11.3431 24 10 22.6569 10 21V15Z"
                fill="white"
              />
              <circle cx="14.5" cy="18" r="1.5" fill="var(--crimson)" />
              <circle cx="18" cy="18" r="1.5" fill="var(--crimson)" />
              <circle cx="21.5" cy="18" r="1.5" fill="var(--crimson)" />
            </svg>
          </div>
          <div class="header-info">
            <span class="header-title">AuroBot</span>
            <span class="header-subtitle">Sri Aurobindo College · DU</span>
          </div>
        </div>
        <div class="header-actions">
          <button class="hdr-btn" id="homeBtn" title="Home">
            <svg viewBox="0 0 20 20" fill="currentColor">
              <path
                d="M10.707 2.293a1 1 0 00-1.414 0l-7 7a1 1 0 001.414 1.414L4 10.414V17a1 1 0 001 1h4v-5h2v5h4a1 1 0 001-1v-6.586l.293.293a1 1 0 001.414-1.414l-7-7z"
              />
            </svg>
          </button>
          <button class="hdr-btn" id="clearBtn" title="Clear chat">
            <svg viewBox="0 0 20 20" fill="currentColor">
              <path
                fill-rule="evenodd"
                d="M9 2a1 1 0 00-.894.553L7.382 4H4a1 1 0 000 2v10a2 2 0 002 2h8a2 2 0 002-2V6a1 1 0 100-2h-3.382l-.724-1.447A1 1 0 0011 2H9zm-1 8a1 1 0 112 0v3a1 1 0 11-2 0v-3zm4-1a1 1 0 10-2 0v4a1 1 0 102 0V9z"
                clip-rule="evenodd"
              />
            </svg>
          </button>
          <button class="hdr-btn close-btn" id="closeBtn" title="Close">
            <svg viewBox="0 0 20 20" fill="currentColor">
              <path
                fill-rule="evenodd"
                d="M4.293 4.293a1 1 0 011.414 0L10 8.586l4.293-4.293a1 1 0 111.414 1.414L11.414 10l4.293 4.293a1 1 0 01-1.414 1.414L10 11.414l-4.293 4.293a1 1 0 01-1.414-1.414L8.586 10 4.293 5.707a1 1 0 010-1.414z"
                clip-rule="evenodd"
              />
            </svg>
          </button>
        </div>
      </div>

      <!-- Status bar -->
      <div class="status-bar">
        <span class="status-dot"></span>
        <span class="status-text"
          >Online · Ask me anything about the college</span
        >
      </div>

      <!-- Messages -->
      <div
        class="chat-messages"
        id="chatMessages"
        role="log"
        aria-live="polite"
      ></div>

      <!-- Typing indicator -->
      <div class="typing-indicator" id="typingIndicator">
        <div class="typing-avatar">
          <svg viewBox="0 0 24 24" fill="white" width="14" height="14">
            <path
              d="M6 9c0-.895.724-1.619 1.619-1.619h8.762C17.276 7.381 18 8.105 18 9v6c0 .895-.724 1.619-1.619 1.619H13l-3 2.381V16.619H7.619C6.724 16.619 6 15.895 6 15V9z"
            />
          </svg>
        </div>
        <div class="typing-dots"><span></span><span></span><span></span></div>
      </div>

      <!-- Input -->
      <div class="chat-input-area">
        <div class="input-wrapper">
          <input
            type="text"
            id="userInput"
            class="chat-input"
            placeholder="Type a question or choose an option above…"
            autocomplete="off"
            maxlength="200"
          />
          <button class="send-btn" id="sendBtn" aria-label="Send message">
            <svg viewBox="0 0 20 20" fill="currentColor">
              <path
                d="M10.894 2.553a1 1 0 00-1.788 0l-7 14a1 1 0 001.169 1.409l5-1.429A1 1 0 009 15.571V11a1 1 0 112 0v4.571a1 1 0 00.725.962l5 1.428a1 1 0 001.17-1.408l-7-14z"
              />
            </svg>
          </button>
        </div>
        <div class="quick-actions">
          <button class="quick-btn" data-action="faq">💡 FAQs</button>
          <button class="quick-btn" data-action="admissions">
            🎓 Admissions
          </button>
          <button class="quick-btn" data-action="courses">📚 Courses</button>
          <button class="quick-btn" data-action="contact">📞 Contact</button>
        </div>
      </div>
    </div>
    <!-- /.chat-window -->

    <!-- Backdrop -->
    <div class="chat-backdrop" id="chatBackdrop"></div>

    <script src="/static/js/chat.js"></script>
  </body>
</html>
